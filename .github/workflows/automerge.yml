name: Auto Merge

on:
  pull_request_target:
    types:
      - edited
      - labeled
      - reopened
      - ready_for_review
      - synchronize
      - unlabeled
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: automerge-${{ github.event.pull_request.number || github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  maybe-merge:
    name: label-gated automerge
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target PR
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || '' }}
          WORKFLOW_RUN_PULL_REQUESTS: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          set -euo pipefail

          pr_number="${PULL_REQUEST_NUMBER}"

          if [ -z "${pr_number}" ] && [ "${WORKFLOW_RUN_PULL_REQUESTS}" != "null" ]; then
            pr_number="$(printf '%s' "${WORKFLOW_RUN_PULL_REQUESTS}" | jq -r '.[0].number // empty')"
          fi

          if [ -z "${pr_number}" ]; then
            echo "No pull request is associated with this event."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "number=${pr_number}" >> "${GITHUB_OUTPUT}"
          echo "skip=false" >> "${GITHUB_OUTPUT}"

      - name: Evaluate merge gate
        id: gate
        if: steps.target.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.target.outputs.number }}
        run: |
          set -euo pipefail

          pr_json="$(gh pr view "${PR_NUMBER}" --json baseRefName,headRefName,headRefOid,isDraft,labels,state,url)"
          checks_json="$(gh pr checks "${PR_NUMBER}" --json bucket,name,workflow 2>/dev/null || true)"

          if [ -z "${checks_json}" ]; then
            checks_json='[]'
          fi

          has_approval_label="$(printf '%s' "${pr_json}" | jq -r '[.labels[].name] | index("approved[e0da]") != null')"
          has_block_label="$(printf '%s' "${pr_json}" | jq -r '[.labels[].name] | index("do-not-merge") != null')"
          base_ref="$(printf '%s' "${pr_json}" | jq -r '.baseRefName')"
          head_ref_name="$(printf '%s' "${pr_json}" | jq -r '.headRefName')"
          is_draft="$(printf '%s' "${pr_json}" | jq -r '.isDraft')"
          state="$(printf '%s' "${pr_json}" | jq -r '.state')"
          head_sha="$(printf '%s' "${pr_json}" | jq -r '.headRefOid')"
          pr_url="$(printf '%s' "${pr_json}" | jq -r '.url')"

          ci_green="$(printf '%s' "${checks_json}" | jq -r 'map(select(.workflow == "CI" and .name == "fmt, clippy, test, build" and .bucket == "pass")) | length > 0')"
          checks_clear="$(printf '%s' "${checks_json}" | jq -r '
            map(select(.workflow != "Auto Merge"))
            | length > 0 and all(.[]; .bucket == "pass" or .bucket == "skipping")
          ')"

          if [ "${state}" != "OPEN" ]; then
            echo "PR ${PR_NUMBER} is not open; skipping."
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${base_ref}" != "main" ]; then
            echo "PR ${PR_NUMBER} targets ${base_ref}; waiting until it targets main."
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${is_draft}" = "true" ]; then
            echo "PR ${PR_NUMBER} is still a draft."
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${has_block_label}" = "true" ]; then
            echo "PR ${PR_NUMBER} has do-not-merge."
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${has_approval_label}" != "true" ]; then
            echo "PR ${PR_NUMBER} is missing approved[e0da]."
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${ci_green}" != "true" ] || [ "${checks_clear}" != "true" ]; then
            echo "PR ${PR_NUMBER} does not have a fully green latest check set."
            echo "ready=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "PR ${PR_NUMBER} is ready for merge: ${pr_url}"
          echo "base_ref=${base_ref}" >> "${GITHUB_OUTPUT}"
          echo "head_ref_name=${head_ref_name}" >> "${GITHUB_OUTPUT}"
          echo "head_sha=${head_sha}" >> "${GITHUB_OUTPUT}"
          echo "ready=true" >> "${GITHUB_OUTPUT}"

      - name: Promote direct child PRs
        if: steps.gate.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BASE_REF: ${{ steps.gate.outputs.base_ref }}
          HEAD_REF_NAME: ${{ steps.gate.outputs.head_ref_name }}
        run: |
          set -euo pipefail

          children_json="$(gh pr list --state open --base "${HEAD_REF_NAME}" --json number,url)"
          child_count="$(printf '%s' "${children_json}" | jq 'length')"

          if [ "${child_count}" -eq 0 ]; then
            echo "No direct child PRs target ${HEAD_REF_NAME}."
            exit 0
          fi

          printf '%s' "${children_json}" | jq -c '.[]' | while read -r child; do
            child_number="$(printf '%s' "${child}" | jq -r '.number')"
            child_url="$(printf '%s' "${child}" | jq -r '.url')"
            echo "Retargeting child PR ${child_number} to ${BASE_REF}: ${child_url}"
            gh pr edit "${child_number}" --base "${BASE_REF}"
          done

          remaining_children="$(gh pr list --state open --base "${HEAD_REF_NAME}" --json number | jq 'length')"

          if [ "${remaining_children}" -ne 0 ]; then
            echo "Refusing to merge while ${remaining_children} child PR(s) still target ${HEAD_REF_NAME}."
            exit 1
          fi

      - name: Merge PR
        if: steps.gate.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.target.outputs.number }}
          HEAD_SHA: ${{ steps.gate.outputs.head_sha }}
        run: |
          set -euo pipefail
          gh api \
            --method PUT \
            "repos/${GH_REPO}/pulls/${PR_NUMBER}/merge" \
            -f merge_method=rebase \
            -f sha="${HEAD_SHA}"
